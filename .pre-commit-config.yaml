# Pre-commit hooks for karyoplot (KaryoScope-plotlib).
#
# Single source of truth for lint/format tool versions — developers and CI use
# the versions pinned here, ensuring identical behavior everywhere. Mirrors the
# sibling KaryoScope-analysis configuration so the ecosystem lints identically.
#
# To set up locally:
#     pip install pre-commit
#     pre-commit install
#
# To run manually on the whole repo:
#     pre-commit run --all-files
#
# https://pre-commit.com

default_language_version:
  python: python3

repos:
  # Generic file hygiene.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        # Don't trim the trailing two-space "hard break" Markdown convention.
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-added-large-files
        args: [--maxkb=1000]

  # Ruff: lint + format. This `rev` is the SINGLE place ruff's version is pinned
  # for the whole project; CI uses pre-commit too, so it applies everywhere.
  # Pinned to match KaryoScope-analysis.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
